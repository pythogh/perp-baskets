<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Backtest · xyz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--s:#fff;--s2:#f3f2ef;--s3:#eae9e4;
  --b:rgba(0,0,0,.08);--b2:rgba(0,0,0,.14);--b3:rgba(0,0,0,.24);
  --tx:#0f0f0e;--tx2:#5c5c56;--tx3:#9c9c94;
  --g:#15803d;--gbg:#f0fdf4;--gb:rgba(21,128,61,.18);
  --r:#b91c1c;--rbg:#fff1f1;--rb:rgba(185,28,28,.18);
  --a:#92400e;--abg:#fffbeb;
  --acc:#0f0f0e;--r8:8px;--r12:12px;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
#shell{display:flex;flex-direction:column;height:100dvh}
/* Topbar */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0;gap:16px}
.t-left{display:flex;align-items:baseline}
#topbar h1{font-size:15px;font-weight:500;letter-spacing:-.2px}
.tsub{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-left:8px}
.t-controls{display:flex;align-items:center;gap:16px}
.pills{display:flex;gap:4px}
.pill{padding:3px 10px;border:1px solid var(--b2);border-radius:20px;font-size:10px;font-family:var(--mono);background:transparent;color:var(--tx2);cursor:pointer;transition:all .1s}
.pill.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.pill:hover:not(.active){border-color:var(--b3);color:var(--tx)}
.lev-wrap{display:flex;align-items:center;gap:8px}
.lev-lbl{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.lev-val{font-size:13px;font-weight:500;font-family:var(--mono);min-width:28px;text-align:right}
input[type=range]{width:80px;accent-color:var(--acc);cursor:pointer}
.live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3);font-family:var(--mono)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
/* Tabs */
#tabs{display:flex;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0;padding:0 20px}
.tabbt{padding:10px 18px;font-size:12px;font-family:var(--sans);cursor:pointer;border:none;background:none;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .1s}
.tabbt.active{color:var(--tx);border-bottom-color:var(--acc);font-weight:500}
.tabbt:hover{color:var(--tx2)}
/* Content */
#content{flex:1;overflow:hidden;display:flex;min-height:0}
.tab-pane{display:none;flex:1;overflow:hidden}
.tab-pane.active{display:flex}
/* Auto tab */
#tab-auto{flex-direction:column;overflow-y:auto}
#tab-auto::-webkit-scrollbar{width:4px}
#tab-auto::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.auto-inner{width:100%;padding:20px}
/* Custom tab */
#tab-custom{flex-direction:row}
#custom-left{width:300px;border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#custom-right{flex:1;overflow-y:auto;padding:20px}
#custom-right::-webkit-scrollbar{width:4px}
#custom-right::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.custom-inner{width:100%}
/* Left panel */
.cpanel-sect{padding:12px 14px;border-bottom:1px solid var(--b);flex-shrink:0}
.cpanel-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);font-family:var(--mono);margin-bottom:6px}
#tok-scroll{flex:1;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:3px;min-height:0}
#tok-scroll::-webkit-scrollbar{width:3px}
#tok-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.tok{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid transparent;border-radius:7px;transition:background .08s}
.tok.sl{background:var(--gbg);border-color:var(--gb)}
.tok.ss{background:var(--rbg);border-color:var(--rb)}
.tok:not(.sl):not(.ss):hover{background:var(--s2)}
.tlogo,.tok-fb{width:20px;height:20px;border-radius:50%;flex-shrink:0}
.tlogo{background:var(--s3);border:1px solid var(--b);object-fit:cover}
.tok-fb{background:var(--s3);border:1px solid var(--b);display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;color:var(--tx2);font-family:var(--mono)}
.tname{font-size:11px;font-weight:500;flex:1}
.trate{font-size:9px;font-family:var(--mono);width:44px;text-align:right;flex-shrink:0}
.lsbtns{display:flex;gap:2px}
.lsb{font-size:9px;font-family:var(--mono);padding:1px 6px;border-radius:3px;border:1px solid var(--b2);background:transparent;color:var(--tx2);cursor:pointer;font-weight:500;transition:all .1s}
.lsb.la{background:var(--gbg);color:var(--g);border-color:var(--gb)}
.lsb.sa{background:var(--rbg);color:var(--r);border-color:var(--rb)}
.lsb:not(.la):not(.sa):hover{background:var(--s3)}
#basket-foot{padding:12px 14px;border-top:1px solid var(--b);flex-shrink:0;background:var(--s)}
.btags{display:flex;flex-wrap:wrap;gap:3px;min-height:20px;margin-bottom:6px}
.delta-txt{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-bottom:8px;min-height:14px}
.run-btn{width:100%;padding:9px;background:var(--acc);color:#fff;font-family:var(--sans);font-size:12px;font-weight:500;border:none;border-radius:var(--r8);cursor:pointer;transition:opacity .1s;display:flex;align-items:center;justify-content:center;gap:6px}
.run-btn:hover{opacity:.82}
.run-btn:disabled{opacity:.3;cursor:not-allowed}
/* Cards */
.rcard{background:var(--s);border:1px solid var(--b);border-radius:var(--r12);margin-bottom:6px;overflow:hidden;transition:border-color .12s}
.rcard:hover{border-color:var(--b2)}
.rcard.open{border-color:var(--acc)}
.rcard-head{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none}
.rnum{font-size:10px;font-family:var(--mono);color:var(--tx3);width:20px;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rname{font-size:12px;font-weight:500}
.rlegs{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tpill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:4px;font-weight:500}
.tpill-l{background:var(--gbg);color:var(--g)}
.tpill-s{background:var(--rbg);color:var(--r)}
.tpill img{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rkpis{display:flex;gap:14px;align-items:center;flex-shrink:0}
.kpi{text-align:right}
.kpi-v{font-size:15px;font-weight:500;font-family:var(--mono);letter-spacing:-.3px}
.kpi-l{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.chevron{color:var(--tx3);transition:transform .2s;flex-shrink:0}
.rcard.open .chevron{transform:rotate(180deg)}
.rdetail{border-top:1px solid var(--b);padding:16px;display:none}
.rcard.open .rdetail{display:block}
/* Stats */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.sc{background:var(--s2);border-radius:var(--r8);padding:10px 12px}
.slbl{font-size:8px;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);font-family:var(--mono);margin-bottom:3px}
.sval{font-size:18px;font-weight:500;font-family:var(--mono);letter-spacing:-.3px}
.ssub{font-size:9px;color:var(--tx3);margin-top:1px}
/* Chart */
.cbox{background:var(--bg);border:1px solid var(--b);border-radius:var(--r8);padding:12px;margin-bottom:12px}
.ctitle{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);font-family:var(--mono);margin-bottom:8px}
/* Table */
.tbl-wrap{border:1px solid var(--b);border-radius:var(--r8);overflow:hidden;margin-bottom:0}
.ltbl{width:100%;border-collapse:collapse;font-size:11px}
.ltbl th{padding:6px 10px;font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;background:var(--s2);border-bottom:1px solid var(--b);font-weight:500;font-family:var(--mono);text-align:left}
.ltbl th.r,.ltbl td.r{text-align:right}
.ltbl td{padding:7px 10px;border-bottom:1px solid var(--b);font-family:var(--mono)}
.ltbl tr:last-child td{border-bottom:none}
.ltbl tr:hover td{background:var(--s2)}
.ltbl tr.total-row td{background:var(--s2);font-weight:500}
.tcell{display:flex;align-items:center;gap:6px}
.tlsm,.tlsm-fb{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.tlsm{background:var(--s3);border:1px solid var(--b);object-fit:cover}
.tlsm-fb{background:var(--s3);border:1px solid var(--b);display:inline-flex;align-items:center;justify-content:center;font-size:6px;font-weight:600;color:var(--tx2);font-family:var(--mono)}
/* Loading / empty */
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:12px;color:var(--tx3);font-size:12px;font-family:var(--mono)}
.loading-inline{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--tx3);font-size:11px;font-family:var(--mono)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--tx3);font-size:12px}
.prog{width:180px;height:2px;background:var(--b);border-radius:2px}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}
.pos{color:var(--g)}.neg{color:var(--r)}
</style>
</head>
<body>

<div id="loading-full" class="loading-full">
  <div>Fetching live data from Hyperliquid…</div>
  <div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div id="prog-text" style="font-size:10px">Connecting…</div>
</div>

<div id="shell" style="display:none">
  <div id="topbar">
    <div class="t-left">
      <h1>Pair Backtest</h1>
      <span class="tsub">xyz perps · funding strategy</span>
    </div>
    <div class="t-controls">
      <div class="lev-wrap">
        <span class="lev-lbl">Leverage</span>
        <input type="range" id="lev-slider" min="1" max="20" step="1" value="1" oninput="onLev(this.value)">
        <span class="lev-val" id="lev-val">1×</span>
      </div>
      <div style="width:1px;height:20px;background:var(--b)"></div>
      <div class="pills">
        <button class="pill active" onclick="setP(7,this)">7d</button>
        <button class="pill" onclick="setP(15,this)">15d</button>
        <button class="pill" onclick="setP(30,this)">30d</button>
      </div>
      <div style="width:1px;height:20px;background:var(--b)"></div>
      <div class="live"><div class="dot"></div><span id="ts">—</span></div>
    </div>
  </div>

  <div id="tabs">
    <button class="tabbt active" onclick="switchTab('auto',this)">Auto-ranked</button>
    <button class="tabbt" onclick="switchTab('custom',this)">Custom basket</button>
  </div>

  <div id="content">
    <div class="tab-pane active" id="tab-auto">
      <div class="auto-inner">
        <div style="margin-bottom:14px">
          <div style="font-size:13px;font-weight:500" id="auto-title">Best strategies · 7d</div>
          <div style="font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:2px">Ranked by Sharpe · short high-funding, long low-funding</div>
        </div>
        <div id="auto-list">
          <div class="loading-inline"><div>Computing…</div><div class="prog"><div class="prog-fill" style="width:50%"></div></div></div>
        </div>
      </div>
    </div>

    <div class="tab-pane" id="tab-custom">
      <div id="custom-left">
        <div class="cpanel-sect">
          <div class="cpanel-lbl">Pick tokens</div>
          <div style="display:flex;gap:10px;font-size:10px;color:var(--tx3)">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--gbg);border:1px solid var(--gb);margin-right:3px;vertical-align:middle"></span>Long</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--rbg);border:1px solid var(--rb);margin-right:3px;vertical-align:middle"></span>Short</span>
          </div>
        </div>
        <div id="tok-scroll"></div>
        <div id="basket-foot">
          <div class="btags" id="btags"><span style="color:var(--tx3);font-size:10px;font-family:var(--mono)">No tokens selected</span></div>
          <div class="delta-txt" id="delta-txt"></div>
          <button class="run-btn" id="run-btn" onclick="runCustom()" disabled>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg>
            Run backtest
          </button>
        </div>
      </div>
      <div id="custom-right">
        <div class="custom-inner">
          <div class="empty-state" id="custom-empty" style="height:300px">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <div>Select tokens and run</div>
          </div>
          <div id="custom-result"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const TOKENS = ['xyz:WTIOIL','xyz:BRENTOIL','xyz:S&P500','xyz:MU','xyz:NVDA','xyz:SILVER','xyz:SNDK','xyz:INTC','xyz:ARM','xyz:GOLD','xyz:PLTR','xyz:SKHYNIX','xyz:MSFT','xyz:CRWV','xyz:ORCL','xyz:EWY','xyz:DRAM','xyz:CRCL','xyz:AMD','xyz:HOOD','xyz:TSLA','xyz:GOOGL','xyz:MRVL','xyz:MSTR','xyz:NATGAS'];

let markets = {}, cache = {}, basket = {}, period = 7, leverage = 1;
let openCards = {}, presetResults = [], customResults = [];

function logo(n) { return `https://app.hyperliquid.xyz/coins/xyz:${n.replace('xyz:','')}.svg`; }
function sp(pct, txt) {
  document.getElementById('prog').style.width = pct + '%';
  if (txt) document.getElementById('prog-text').textContent = txt;
}
function fbLogo(img, ticker) {
  img.style.display = 'none';
  const fb = document.createElement('span');
  fb.className = img.classList.contains('tlogo') ? 'tok-fb' : 'tlsm-fb';
  fb.textContent = (ticker || '?').replace('xyz:','').slice(0,3).toUpperCase();
  img.parentNode.insertBefore(fb, img.nextSibling);
}

async function hl(body) {
  const r = await fetch('https://api.hyperliquid.xyz/info', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  return r.json();
}

async function fetchMarkets() {
  const [meta, ctxs] = await hl({ type: 'metaAndAssetCtxs', dex: 'xyz' });
  meta.universe.forEach((u, i) => {
    const c = ctxs[i];
    markets[u.name] = {
      name: u.name,
      display: u.name.replace('xyz:', ''),
      fundingAnnual: parseFloat(c.funding) * 8760 * 100,
      price: parseFloat(c.markPx)
    };
  });
}

async function getH(coin, days) {
  const k = coin + '_' + days;
  if (cache[k]) return cache[k];
  const end = Date.now(); let start = end - days * 86400000, all = [];
  while (true) {
    try {
      const p = await hl({ type: 'fundingHistory', coin, startTime: start });
      if (!Array.isArray(p) || !p.length) break;
      all = all.concat(p);
      if (p.length < 490) break;
      start = p[p.length-1].time + 1;
      if (start >= end) break;
    } catch(_) { break; }
  }
  const d = all.map(x => ({ time: x.time, rate: parseFloat(x.fundingRate) * 8760 * 100 }));
  cache[k] = d; return d;
}

async function prefetch(names, days, onP) {
  const need = [...new Set(names)].filter(n => !cache[n+'_'+days]);
  if (!need.length) return;
  const B = 8; let done = 0;
  for (let i = 0; i < need.length; i += B) {
    await Promise.all(need.slice(i, i+B).map(async n => {
      await getH(n, days); done++;
      if (onP) onP(done, need.length);
    }));
  }
}

async function compute(legs, days, lev) {
  const tdr = {}, ts = new Set();
  for (const b of legs) {
    const h = await getH(b.name, days);
    tdr[b.name] = {};
    h.forEach(d => {
      const dk = Math.floor(d.time / 86400000) * 86400000;
      if (!tdr[b.name][dk]) tdr[b.name][dk] = [];
      tdr[b.name][dk].push(d.rate);
      ts.add(dk);
    });
    Object.keys(tdr[b.name]).forEach(k => {
      const a = tdr[b.name][k];
      tdr[b.name][k] = a.reduce((s,v)=>s+v,0) / a.length;
    });
  }
  const dkeys = [...ts].sort((a,b) => a-b);
  const daily = dkeys.map(dk => {
    let s = 0, c = 0;
    legs.forEach(b => {
      const rv = tdr[b.name][dk];
      if (rv == null) return;
      s += (b.side === 'S' ? rv : -rv) / 365 * lev;
      c++;
    });
    return c ? { time: dk, pnl: s } : null;
  }).filter(Boolean);
  let cum = 0;
  const series = daily.map(d => { cum += d.pnl; return { time: d.time, cum, pnl: d.pnl }; });
  const vals = daily.map(d => d.pnl);
  const avg = vals.reduce((s,v)=>s+v,0) / (vals.length||1);
  const std = Math.sqrt(vals.reduce((s,v)=>s+Math.pow(v-avg,2),0) / (vals.length||1));
  const sharpe = std > 0 ? avg / std * Math.sqrt(252) : 0;
  const winRate = vals.filter(v=>v>0).length / (vals.length||1) * 100;
  const tStats = legs.map(b => {
    const h = cache[b.name+'_'+days] || [];
    const rates = h.map(d => d.rate);
    const avgR = rates.reduce((s,v)=>s+v,0) / (rates.length||1);
    return { ...b, avgRate: avgR, contrib: (b.side==='S' ? avgR : -avgR) * lev };
  });
  return { totalPnl: cum, sharpe, winRate, series, tStats, nDays: vals.length, lev };
}

function generatePresets() {
  const av = TOKENS.filter(n => markets[n])
    .map(n => ({ name: n, rate: markets[n].fundingAnnual }))
    .sort((a,b) => b.rate - a.rate);
  const top = av.slice(0, 8), bot = av.slice(-8);
  return [
    { id:'a1', name:'High yield shorts',   longs: bot.slice(0,3).map(t=>t.name), shorts: top.slice(0,3).map(t=>t.name) },
    { id:'a2', name:'Max funding capture', longs: bot.slice(0,2).map(t=>t.name), shorts: top.slice(0,5).map(t=>t.name) },
    { id:'a3', name:'Balanced 4×4',        longs: bot.slice(0,4).map(t=>t.name), shorts: top.slice(0,4).map(t=>t.name) },
    { id:'a4', name:'Pure short',          longs: [bot[0].name],                  shorts: top.slice(0,6).map(t=>t.name) },
    { id:'a5', name:'Tight spread',        longs: [bot[0].name],                  shorts: [top[0].name] },
    { id:'a6', name:'Mid-tier shorts',     longs: bot.slice(0,3).map(t=>t.name), shorts: top.slice(2,7).map(t=>t.name) },
  ].map(p => ({
    ...p,
    longs: p.longs.filter(n => markets[n]),
    shorts: p.shorts.filter(n => markets[n])
  })).filter(p => p.longs.length && p.shorts.length);
}

async function init() {
  try {
    sp(5, 'Loading markets…');
    await fetchMarkets();
    const presets = generatePresets();
    const all = [...new Set(presets.flatMap(p => [...p.longs, ...p.shorts]))].filter(n => markets[n]);
    sp(10, 'Fetching history…');
    await prefetch(all, period, (d,t) => sp(10 + Math.round(d/t*72), `Fetched ${d}/${t} tokens…`));
    sp(84, 'Computing…');
    document.getElementById('loading-full').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    buildTokList();
    await runPresets(presets);
  } catch(e) {
    sp(100, 'Error: ' + e.message);
    document.getElementById('prog').style.background = '#b91c1c';
    console.error('Init error:', e);
  }
}

async function runPresets(presets, autoOpen) {
  document.getElementById('auto-title').textContent = `Best strategies · ${period}d${leverage>1?' · '+leverage+'×':''}`;
  const results = [];
  for (const p of presets) {
    const legs = [...p.longs.map(n=>({name:n,side:'L'})), ...p.shorts.map(n=>({name:n,side:'S'}))];
    try { const r = await compute(legs, period, leverage); results.push({...p, legs, result: r}); } catch(_) {}
  }
  results.sort((a,b) => b.result.sharpe - a.result.sharpe);
  presetResults = results;
  document.getElementById('auto-list').innerHTML = results.map((p,i) => buildCard(p, i, 'auto')).join('');
  if (autoOpen !== false && results.length) setTimeout(() => toggleCard(0, 'auto'), 80);
}

function legPills(legs) {
  return legs.map(l => `<span class="tpill tpill-${l.side.toLowerCase()}"><img src="${logo(l.name)}" onerror="this.style.display='none'">${markets[l.name]?.display||l.name.replace('xyz:','')}</span>`).join('');
}

function buildCard(p, i, ns) {
  const r = p.result;
  const pc = r.totalPnl>=0 ? 'var(--g)' : 'var(--r)';
  const sc = r.sharpe>=1.5 ? 'var(--g)' : r.sharpe>=0.5 ? 'var(--a)' : 'var(--r)';
  const id = `${ns}-${i}`;
  return `<div class="rcard" id="rc-${id}">
    <div class="rcard-head" onclick="toggleCard(${i},'${ns}')">
      ${ns==='auto' ? `<span class="rnum">#${i+1}</span>` : ''}
      <div class="rinfo">
        <div class="rname">${p.name}</div>
        <div class="rlegs">${legPills(p.legs)}</div>
      </div>
      <div class="rkpis">
        <div class="kpi"><div class="kpi-v" style="color:${sc}">${r.sharpe>=0?'+':''}${r.sharpe.toFixed(2)}</div><div class="kpi-l">Sharpe</div></div>
        <div class="kpi"><div class="kpi-v" style="color:${pc}">${r.totalPnl>=0?'+':''}${r.totalPnl.toFixed(2)}%</div><div class="kpi-l">P&L (${period}d)</div></div>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
    </div>
    <div class="rdetail" id="rd-${id}"></div>
  </div>`;
}

function buildDetail(p, id) {
  const r = p.result, lev = r.lev || 1;
  const pc = r.totalPnl>=0 ? 'var(--g)' : 'var(--r)';
  const sc = r.sharpe>=1.5 ? 'var(--g)' : r.sharpe>=0.5 ? 'var(--a)' : 'var(--r)';
  const ann = r.totalPnl / period * 365;
  const fmt$ = n => '$' + Math.round(Math.abs(n)).toLocaleString('en-US');

  // Sizing table
  const weights = window._sizingMode === 'rate'
    ? (() => {
        const rates = r.tStats.map(t => Math.max(Math.abs(markets[t.name]?.fundingAnnual||0.1),0.1));
        const total = rates.reduce((s,v)=>s+v,0);
        return rates.map(v => v/total);
      })()
    : r.tStats.map(() => 1/r.tStats.length);

  const CAPITAL = 10000;
  const rows = r.tStats.map((t,i) => {
    const alloc = weights[i];
    const notional = CAPITAL * alloc;
    const cur = markets[t.name]?.fundingAnnual ?? 0;
    const vsAvg = cur > t.avgRate*1.1 ? '↑' : cur < t.avgRate*0.9 ? '↓' : '~';
    const expected = notional * Math.abs(cur) / 100 * (period/365) * (t.side==='S' ? 1 : -1);
    return { t, alloc, notional, cur, vsAvg, expected };
  });
  const totalExpected = rows.reduce((s,r)=>s+r.expected,0);

  return `
    <div class="sgrid">
      <div class="sc"><div class="slbl">P&L over ${period}d</div><div class="sval" style="color:${pc}">${r.totalPnl>=0?'+':''}${r.totalPnl.toFixed(2)}%</div><div class="ssub">$10k → ${r.totalPnl>=0?'+':''}$${(r.totalPnl/100*10000).toFixed(0)}</div></div>
      <div class="sc"><div class="slbl">Sharpe</div><div class="sval" style="color:${sc}">${r.sharpe.toFixed(2)}</div><div class="ssub">${r.sharpe>=2?'Excellent':r.sharpe>=1?'Good':r.sharpe>=0?'Weak':'Negative'}</div></div>
      <div class="sc"><div class="slbl">Win rate</div><div class="sval">${r.winRate.toFixed(0)}%</div><div class="ssub">${r.nDays}d tracked</div></div>
      <div class="sc"><div class="slbl">Ann. (extrapolated)</div><div class="sval" style="color:${pc}">${ann>=0?'+':''}${ann.toFixed(1)}%</div><div class="ssub">${period}d × (365/${period})</div></div>
    </div>
    <div class="cbox"><div class="ctitle">Cumulative P&L</div><div style="height:200px"><canvas id="chart-${id}"></canvas></div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);font-family:var(--mono)">Positions — $10 000 capital</div>
      <div style="display:flex;gap:3px">
        <button onclick="setSizingMode('${id}','eq')" id="sz-eq-${id}" class="pill active" style="padding:2px 8px;font-size:9px">Equal</button>
        <button onclick="setSizingMode('${id}','rate')" id="sz-rate-${id}" class="pill" style="padding:2px 8px;font-size:9px">By rate</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="ltbl">
        <thead><tr><th>Token</th><th>Side</th><th class="r">Notional</th><th class="r">Current /yr</th><th class="r">Avg /yr</th><th class="r">Expected (${period}d)</th></tr></thead>
        <tbody>
        ${rows.map(({t,alloc,notional,cur,vsAvg,expected}) => `
          <tr>
            <td><div class="tcell">
              <img class="tlsm" src="${logo(t.name)}" onerror="fbLogo(this,'${markets[t.name]?.display||t.name.replace('xyz:','')}')" alt="">
              <span>${markets[t.name]?.display||t.name.replace('xyz:','')}</span>
            </div></td>
            <td><span class="tpill tpill-${t.side.toLowerCase()}" style="display:inline-flex">${t.side==='L'?'Long':'Short'}</span></td>
            <td class="r">${fmt$(notional)}</td>
            <td class="r ${cur>=0?'pos':'neg'}">${cur>=0?'+':''}${cur.toFixed(1)}% <span style="font-size:9px;color:var(--tx3)">${vsAvg}</span></td>
            <td class="r ${t.avgRate>=0?'pos':'neg'}">${t.avgRate>=0?'+':''}${t.avgRate.toFixed(1)}%</td>
            <td class="r ${expected>=0?'pos':'neg'}">${expected>=0?'+':'−'}${fmt$(expected)}</td>
          </tr>`).join('')}
        <tr class="total-row">
          <td colspan="5" style="padding:7px 10px">Total expected over ${period}d</td>
          <td class="r ${totalExpected>=0?'pos':'neg'}">${totalExpected>=0?'+':'−'}${fmt$(totalExpected)}</td>
        </tr>
        </tbody>
      </table>
    </div>`;
}

function toggleCard(i, ns) {
  const id = `${ns}-${i}`, card = document.getElementById('rc-'+id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  if (isOpen) {
    card.classList.remove('open');
    if (openCards[id]) { openCards[id].destroy(); delete openCards[id]; }
    return;
  }
  card.classList.add('open');
  const results = ns === 'auto' ? presetResults : customResults;
  const p = results[i]; if (!p) return;
  const detailEl = document.getElementById('rd-'+id);
  detailEl.innerHTML = buildDetail(p, id);
  setTimeout(() => {
    const canvas = document.getElementById('chart-'+id);
    if (!canvas || !p.result.series.length) return;
    if (openCards[id]) openCards[id].destroy();
    const vals = p.result.series.map(d=>d.cum), isPos = vals[vals.length-1] >= 0;
    const col = isPos ? '#15803d' : '#b91c1c', bg = isPos ? 'rgba(21,128,61,.07)' : 'rgba(185,28,28,.05)';
    openCards[id] = new Chart(canvas, {
      type: 'line',
      data: {
        labels: p.result.series.map(d => new Date(d.time).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})),
        datasets: [{ data: vals, borderColor: col, backgroundColor: bg, fill: true, borderWidth: 1.5, pointRadius: 0, tension: 0.35 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.parsed.y>=0?'+':''}${c.parsed.y.toFixed(3)}%` } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Mono,monospace', size: 9 }, color: '#9c9c94', maxTicksLimit: 8 } },
          y: { grid: { color: 'rgba(0,0,0,.05)' }, ticks: { font: { family: 'DM Mono,monospace', size: 9 }, color: '#9c9c94', callback: v => (v>=0?'+':'')+v.toFixed(1)+'%' } }
        }
      }
    });
  }, 30);
}

function setSizingMode(id, mode) {
  window._sizingMode = mode;
  document.getElementById('sz-eq-'+id)?.classList.toggle('active', mode==='eq');
  document.getElementById('sz-rate-'+id)?.classList.toggle('active', mode==='rate');
  const ns = id.split('-')[0], idx = parseInt(id.split('-')[1]);
  const results = ns==='auto' ? presetResults : customResults;
  const p = results[idx]; if (!p) return;
  const detailEl = document.getElementById('rd-'+id);
  if (detailEl) detailEl.innerHTML = buildDetail(p, id);
  // Reopen card (chart needs redraw)
  document.getElementById('rc-'+id)?.classList.add('open');
  setTimeout(() => {
    const canvas = document.getElementById('chart-'+id);
    if (!canvas || !p.result.series.length) return;
    if (openCards[id]) openCards[id].destroy();
    const vals = p.result.series.map(d=>d.cum), isPos = vals[vals.length-1]>=0;
    const col = isPos?'#15803d':'#b91c1c', bg = isPos?'rgba(21,128,61,.07)':'rgba(185,28,28,.05)';
    openCards[id] = new Chart(canvas, {
      type:'line',data:{labels:p.result.series.map(d=>new Date(d.time).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})),datasets:[{data:vals,borderColor:col,backgroundColor:bg,fill:true,borderWidth:1.5,pointRadius:0,tension:0.35}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'DM Mono,monospace',size:9},color:'#9c9c94',maxTicksLimit:8}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{family:'DM Mono,monospace',size:9},color:'#9c9c94',callback:v=>(v>=0?'+':'')+v.toFixed(1)+'%'}}}}
    });
  }, 30);
}

async function onLev(v) {
  leverage = parseInt(v);
  document.getElementById('lev-val').textContent = leverage + '×';
  Object.values(openCards).forEach(c => { if(c.destroy) c.destroy(); }); openCards = {};
  await runPresets(generatePresets(), false);
}

async function setP(d, btn) {
  period = d;
  document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b===btn));
  Object.values(openCards).forEach(c => { if(c.destroy) c.destroy(); }); openCards = {};
  document.getElementById('auto-list').innerHTML = '<div class="loading-inline"><div>Fetching…</div><div class="prog"><div class="prog-fill" style="width:30%"></div></div></div>';
  const presets = generatePresets();
  await prefetch([...new Set(presets.flatMap(p=>[...p.longs,...p.shorts]))].filter(n=>markets[n]), d);
  await runPresets(presets);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tabbt').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'custom') buildTokList();
}

function buildTokList() {
  document.getElementById('tok-scroll').innerHTML = TOKENS.filter(t=>markets[t]).map(n => {
    const m = markets[n], s = basket[n];
    const cls = s==='L' ? 'sl' : s==='S' ? 'ss' : '';
    const rc = m.fundingAnnual>=0 ? 'var(--g)' : 'var(--r)';
    return `<div class="tok ${cls}">
      <img class="tlogo" src="${logo(n)}" alt="${m.display}" onerror="fbLogo(this,'${m.display}')">
      <span class="tname">${m.display}</span>
      <span class="trate" style="color:${rc}">${m.fundingAnnual>=0?'+':''}${m.fundingAnnual.toFixed(1)}%</span>
      <div class="lsbtns">
        <button class="lsb ${s==='L'?'la':''}" onclick="setSide('${n}','L')">L</button>
        <button class="lsb ${s==='S'?'sa':''}" onclick="setSide('${n}','S')">S</button>
      </div>
    </div>`;
  }).join('');
}

function setSide(n, side) {
  if (basket[n]===side) delete basket[n]; else basket[n]=side;
  buildTokList(); updateBasket();
}

function updateBasket() {
  const legs = Object.entries(basket);
  const tags = document.getElementById('btags'), dt = document.getElementById('delta-txt'), btn = document.getElementById('run-btn');
  if (!legs.length) { tags.innerHTML='<span style="color:var(--tx3);font-size:10px;font-family:var(--mono)">No tokens selected</span>'; dt.textContent=''; btn.disabled=true; return; }
  const L = legs.filter(([,s])=>s==='L').length, S = legs.filter(([,s])=>s==='S').length;
  const net = (L-S)/legs.length;
  tags.innerHTML = legs.map(([n,s]) => `<span class="tpill tpill-${s.toLowerCase()}"><img src="${logo(n)}" style="width:10px;height:10px;border-radius:50%" onerror="this.style.display='none'">${markets[n]?.display||n.replace('xyz:','')}</span>`).join('');
  const lbl = Math.abs(net)<0.1 ? '✓ Neutral' : net>0 ? `+${(net*100).toFixed(0)}% long bias` : `${(net*100).toFixed(0)}% short bias`;
  dt.innerHTML = `<span style="color:${Math.abs(net)<0.1?'var(--g)':'var(--a)'}">${lbl}</span>`;
  btn.disabled = legs.length < 2;
}

async function runCustom() {
  const legs = Object.entries(basket).map(([n,s]) => ({name:n,side:s}));
  if (legs.length < 2) return;
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = 'Running…';
  document.getElementById('custom-empty').style.display = 'none';
  document.getElementById('custom-result').innerHTML = '<div class="loading-inline"><div>Computing…</div></div>';
  try {
    await prefetch(legs.map(l=>l.name), period);
    const r = await compute(legs, period, leverage);
    const p = { name: 'Custom basket', legs, result: r };
    customResults = [p];
    document.getElementById('custom-result').innerHTML = buildCard(p, 0, 'custom');
    setTimeout(() => toggleCard(0, 'custom'), 80);
  } catch(e) {
    document.getElementById('custom-result').innerHTML = `<div style="color:var(--r);font-size:12px;padding:20px">Error: ${e.message}</div>`;
    console.error(e);
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg> Run backtest';
}

init();
</script>
</body>
</html>
